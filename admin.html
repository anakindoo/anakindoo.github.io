<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - ANAKINDO</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script>    
        function logoutAdmin() {
            try { localStorage.removeItem('isAdmin'); } catch(e) {}
            window.location.replace('login.html');
        }
    </script>
    <style>
        body { background-color: var(--bg-light); display: flex; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .admin-sidebar { width: 280px; background: var(--white); box-shadow: 5px 0 25px rgba(74, 172, 2, 0.05); position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 2000; transition: transform 0.4s ease; }
        .admin-nav { padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; }
        .admin-nav a { text-decoration: none; color: var(--text-muted); font-weight: 600; padding: 15px 25px; border-radius: 12px; transition: all 0.3s ease; cursor: pointer; }
        .admin-nav a:hover, .admin-nav a.active { background: var(--fade-green); color: var(--white); }
        .admin-main { margin-left: 280px; width: calc(100% - 280px); padding: 40px 50px; transition: margin 0.4s ease, width 0.4s ease; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 40px; }
        .stat-card { background: var(--white); padding: 30px; border-radius: 20px; box-shadow: var(--shadow-float); position: relative; border: 1px solid rgba(74, 172, 2, 0.05); }
        .admin-table-container { background: var(--white); border-radius: 20px; padding: 30px; box-shadow: var(--shadow-float); margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 18px 15px; text-align: left; border-bottom: 1px solid rgba(74, 172, 2, 0.1); }
        .admin-mobile-toggle { display: none; }
        
        /* Styling untuk dropdown status */
        .select-status { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(74, 172, 2, 0.3); background: var(--bg-light); font-weight: 600; color: var(--text-main); cursor: pointer; outline: none; }
        .select-status:focus { border-color: var(--brand-green); }

        @media (max-width: 992px) {
            .admin-sidebar { transform: translateX(-100%); } 
            .admin-sidebar.active { transform: translateX(0); } 
            .admin-main { margin-left: 0; width: 100%; padding: 20px; padding-top: 80px; } 
            .admin-mobile-toggle { display: block; position: fixed; top: 15px; left: 15px; z-index: 2001; background: var(--fade-green); color: var(--white); border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; box-shadow: var(--shadow-btn); font-weight: bold; }
            .stat-grid { grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px;}
            .admin-table-container { overflow-x: auto; padding: 15px; }
            table { min-width: 800px; } 
        }
    </style>
</head>
<body>
    
    <button class="admin-mobile-toggle" id="adminToggle" onclick="var sidebar = document.getElementById('adminSidebar'); sidebar.classList.toggle('active'); this.innerHTML = sidebar.classList.contains('active') ? '✕ Tutup' : '☰ Menu Admin';">☰ Menu Admin</button>
    
    <aside class="admin-sidebar" id="adminSidebar">
        <div class="admin-logo" style="display: flex; align-items: center; justify-content: center; gap: 12px; padding: 30px; border-bottom: 1px solid rgba(0,0,0,0.1);">
            <img src="assets/img/logo.png" alt="Logo" style="max-width: 45px;">
            <span class="logo-text" style="font-size: 1.4rem; font-weight: 800; color: var(--text-main);">ANAKINDO</span>
        </div>
        <nav class="admin-nav">
            <a id="nav-dashboard" class="active" onclick="gantiTab('dashboard')">Dashboard Utama</a>
            <a id="nav-katalog" onclick="gantiTab('katalog')">Katalog Produk</a>
            <a onclick="logoutAdmin()" style="color: var(--brand-red); border: 1px solid rgba(252, 3, 3, 0.2); margin-top: 20px;">Keluar (Logout)</a>
            <a href="index.html" style="margin-top: 10px; text-align: center; background: rgba(74, 172, 2, 0.05); color: var(--brand-green);">Lihat Website Publik</a>
        </nav>
    </aside>

    <main class="admin-main">
        
        <div id="tab-dashboard">
            <div class="stat-grid">
                <div class="stat-card" style="border-left: 5px solid var(--brand-green);">
                    <h4 style="margin:0; color:var(--text-muted);">Total Pesanan Masuk</h4>
                    <h2 id="totalPesanan" style="font-size: 2.5rem; color: var(--brand-green); margin: 10px 0 0 0;">0</h2>
                </div>
            </div>

            <div class="admin-table-container">
                <h3 style="margin-bottom: 25px; color: var(--text-main);">Daftar Pesanan Publik</h3>
                <table>
                    <thead>
                        <tr>
                            <th>ID TRX</th>
                            <th>Nama Klien</th>
                            <th>Kontak</th>
                            <th>Layanan Diminta</th>
                            <th>Jadwal Pelaksanaan</th>
                            <th>Status Operasional</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelAdminLokal">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="tab-katalog" style="display: none;">
            <div class="admin-table-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h3 style="margin: 0; color: var(--text-main);">Manajemen Katalog Jasa</h3>
                    <button class="btn-sm" style="background: var(--brand-green); padding: 10px 20px; font-size: 1rem;">+ Tambah Jasa Baru</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID Jasa</th>
                            <th>Nama Layanan</th>
                            <th>Kategori</th>
                            <th>Harga Dasar (Rp)</th>
                            <th>Satuan</th>
                        </tr>
                    </thead>
                    <tbody id="tabelKatalog">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // FUNGSI BERPINDAH TAB
        function gantiTab(tab) {
            document.getElementById('tab-dashboard').style.display = tab === 'dashboard' ? 'block' : 'none';
            document.getElementById('tab-katalog').style.display = tab === 'katalog' ? 'block' : 'none';

            document.getElementById('nav-dashboard').classList.toggle('active', tab === 'dashboard');
            document.getElementById('nav-katalog').classList.toggle('active', tab === 'katalog');

            if(tab === 'katalog') {
                muatDataKatalog();
            } else {
                muatDataPesanan();
            }
        }

        // FUNGSI MEMUAT DATA PESANAN DARI DATABASE
        async function muatDataPesanan() {
            var tbody = document.getElementById('tabelAdminLokal');
            var totalEl = document.getElementById('totalPesanan');
            
            try {
                // UBAH 'nama_folder_anda' sesuai folder XAMPP Anda
                const response = await fetch('http://localhost/anakindo/get_pesanan.php');
                const result = await response.json();
                
                if (result.sukses) {
                    const orders = result.data;
                    if (totalEl) totalEl.innerText = orders.length;
                    
                    if (orders.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 30px; color: #888;">Belum ada pesanan masuk di database.</td></tr>';
                        return;
                    }
                    
                    tbody.innerHTML = '';
                    orders.forEach(function(order) {
                        var detailPopUp = "LOKASI:\\n" + (order.alamat || "Tidak ada") + "\\n\\nKELUHAN / KEBUTUHAN:\\n" + (order.deskripsi || "Tidak ada");
                        var nomorWA = order.nomor ? order.nomor.replace(/^0/, '62') : '';
                        var teksSapaan = `Halo Kak ${order.nama}, saya admin dari ANAKINDO. \n\nKami telah menerima pesanan Anda untuk layanan *${order.layanan}* yang dijadwalkan pada tanggal *${order.tanggal || '-'}*. \n\nApakah kita bisa berdiskusi lebih lanjut mengenai detail persiapan dan lokasinya?`;
                        var pesanURL = encodeURIComponent(teksSapaan);
                        
                        tbody.innerHTML += `
                            <tr>
                                <td style="font-weight: bold; color: var(--brand-green);">#${order.order_id}</td>
                                <td>${order.nama}</td>
                                <td>
                                    ${order.nomor || '-'}<br>
                                    ${order.nomor ? `<a href="https://wa.me/${nomorWA}?text=${pesanURL}" target="_blank" style="color: var(--brand-green); font-size: 0.8rem; text-decoration: none; font-weight: bold;">💬 Chat WA</a>` : ''}
                                </td>
                                <td>${order.layanan}</td>
                                <td><strong>${order.tanggal || '-'}</strong> | ${order.waktu || '-'} WIB</td> 
                                
                                <td>
                                    <select class="select-status" onchange="ubahStatus('${order.order_id}', this.value)">
                                        <option value="Menunggu" ${order.status === 'Menunggu' ? 'selected' : ''}>Menunggu</option>
                                        <option value="Diproses" ${order.status === 'Diproses' ? 'selected' : ''}>Diproses</option>
                                        <option value="Selesai" ${order.status === 'Selesai' ? 'selected' : ''}>Selesai</option>
                                        <option value="Batal" ${order.status === 'Batal' ? 'selected' : ''}>Batal</option>
                                    </select>
                                </td>

                                <td><button class="btn-sm" style="background: var(--fade-green); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;" onclick="alert('${detailPopUp}')">Detail</button></td>
                            </tr>
                        `;
                    });
                }
            } catch (error) {
                console.error("Error:", error);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color: red;">Gagal terhubung ke database.</td></tr>';
            }
        }

        // FUNGSI MEMUAT DATA KATALOG
        async function muatDataKatalog() {
            var tbody = document.getElementById('tabelKatalog');
            try {
                // UBAH 'nama_folder_anda' sesuai folder XAMPP Anda
                const response = await fetch('http://localhost/anakindo/get_katalog.php');
                const result = await response.json();
                
                if (result.sukses) {
                    tbody.innerHTML = '';
                    result.data.forEach(function(item) {
                        // Format angka ke Rupiah
                        var harga = new Intl.NumberFormat('id-ID').format(item.harga_dasar);
                        
                        tbody.innerHTML += `
                            <tr>
                                <td style="font-weight: bold; color: var(--text-muted);">SVC-${item.id}</td>
                                <td style="font-weight: 600;">${item.nama_layanan}</td>
                                <td>${item.kategori}</td>
                                <td>Rp ${harga}</td>
                                <td>Per ${item.satuan_harga}</td>
                            </tr>
                        `;
                    });
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color: red;">Gagal memuat katalog.</td></tr>';
            }
        }

        // FUNGSI MENGUBAH STATUS PESANAN KE DATABASE
        async function ubahStatus(orderId, statusBaru) {
            try {
                // UBAH 'nama_folder_anda' sesuai folder XAMPP Anda
                const response = await fetch('http://localhost/anakindo/update_status.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId, status_baru: statusBaru })
                });

                const result = await response.json();
                if (result.sukses) {
                    alert(`Status pesanan #${orderId} berhasil diubah menjadi ${statusBaru}.`);
                } else {
                    alert("Gagal mengubah status: " + result.pesan);
                    muatDataPesanan(); // Kembalikan tabel ke kondisi awal jika gagal
                }
            } catch (error) {
                alert("Terjadi kesalahan jaringan.");
                muatDataPesanan();
            }
        }

        // Muat data pesanan pertama kali halaman dibuka
        document.addEventListener("DOMContentLoaded", muatDataPesanan);
    </script>
</body>
</html>
