<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ANAKINDO</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <style>
        body { background: var(--fade-green); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: var(--white); padding: 50px 40px; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        .login-box img { max-width: 150px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { color: var(--text-muted); font-size: 0.9rem; font-weight: 600; }
        input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 10px; background: var(--bg-light); color: var(--text-main); transition: 0.3s; margin-top: 5px; }
        input:focus { border-color: var(--brand-green); outline: none; background: var(--white); }
    </style>
</head>
<body>
    <div class="login-box">
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Masukkan username..." required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Kata Sandi</label>
                <div style="position: relative;">
                    <input type="password" id="passwordInput" name="password" placeholder="Masukkan password..." required style="padding-right: 45px;">
                    
                    <span onclick="togglePassword()" style="position: absolute; right: 15px; top: 55%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: color 0.3s;" onmouseover="this.style.color='var(--brand-green)'" onmouseout="this.style.color='var(--text-muted)'">
                        <svg id="eyeIcon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                    </span>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login ke Dashboard</button>
        </form>

        <a href="index.html" style="display: block; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← Kembali ke Website</a>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault(); // Mencegah halaman me-refresh sendiri
                    const user = loginForm.username.value;
                    const pass = loginForm.password.value;

                    // Validasi username dan password
                    if (user === 'admin' && pass === 'anakindo123') {
                        sessionStorage.setItem('isAdmin', 'true');
                        window.location.href = 'admin.html';
                    } else {
                        alert('Akses Ditolak: Username atau Kata Sandi salah!');
                    }
                });
            }
        });
        function togglePassword() {
                var passInput = document.getElementById('passwordInput');
                var eyeIcon = document.getElementById('eyeIcon');
                
                if (passInput.type === 'password') {
                    passInput.type = 'text';
                    // Ubah menjadi ikon mata dicoret (Hide)
                    eyeIcon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
                } else {
                    passInput.type = 'password';
                    // Kembali ke ikon mata terbuka (Show)
                    eyeIcon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
                }
            }
    </script>
</body>
</html>
